name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_GOOGLE_ADSENSE_CLIENT: ''
      NEXT_PUBLIC_ADSENSE_REWARDED_AD_UNIT: ''
      TMDB_API_READ_ACCESS_TOKEN: ci-tmdb-token
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      ADMIN_API_SECRET: ci-admin-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
